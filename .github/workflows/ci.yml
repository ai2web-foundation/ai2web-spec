name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  conformance:
    name: Conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node --experimental-strip-types conformance/run.mjs
  schema:
    name: JSON Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Validate reference manifests against the schema
        run: >
          npx --yes ajv-cli@5 validate
          -s schema/ai2w-manifest-0.1.schema.json
          -d "examples/*.json" --spec=draft2020 --strict=false
